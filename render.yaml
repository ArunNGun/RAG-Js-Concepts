services:
  - type: web
    name: rag-js-concepts
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: BASE_URL
        value: https://api.fuelix.ai
      - key: API_KEY
        sync: false   # set this manually in Render dashboard — do not commit
      - key: MODEL
        value: claude-sonnet-4-6
