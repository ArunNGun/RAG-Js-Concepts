<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG — Knowledge Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --border-soft: #1e1e1e;
      --text: #e8e8e8;
      --text-muted: #6b6b6b;
      --text-dim: #3d3d3d;
      --accent: #e8c547;
      --accent-dim: #3d3320;
      --green: #4caf79;
      --green-dim: #1a3328;
      --red: #e05c5c;
      --red-dim: #2e1a1a;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 24px;
      border-bottom: 1px solid var(--border);
    }

    .header-left h1 {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .header-left .tagline {
      font-size: 22px;
      font-weight: 300;
      color: var(--text);
      margin-top: 4px;
      letter-spacing: -0.02em;
    }

    .header-left .tagline span {
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Status button ── */
    .status-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      user-select: none;
    }

    .status-btn:hover {
      border-color: #3a3a3a;
      background: #1c1c1c;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-btn.online .status-dot { background: var(--green); }
    .status-btn.offline .status-dot { background: var(--red); }
    .status-btn.checking .status-dot {
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-label { transition: color 0.2s; }
    .status-btn.online .status-label { color: var(--green); }
    .status-btn.offline .status-label { color: var(--red); }
    .status-btn.checking .status-label { color: var(--accent); }

    /* ── Main ── */
    main {
      padding: 36px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Wake notice ── */
    .wake-notice {
      display: none;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid var(--accent-dim);
      border-radius: 4px;
      background: rgba(232, 197, 71, 0.04);
      margin-bottom: 28px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      line-height: 1.5;
    }
    .wake-notice.visible { display: flex; }
    .wake-icon { flex-shrink: 0; margin-top: 1px; }

    /* ── Chat area ── */
    .chat-area {
      display: flex;
      flex-direction: column;
      gap: 32px;
      min-height: 200px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 48px 0 0;
    }

    .empty-state .prompt-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .empty-state .suggestions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
    }

    .suggestion-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--border-soft);
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 13px;
      color: var(--text-muted);
      text-align: left;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      width: fit-content;
    }

    .suggestion-chip:hover {
      border-color: var(--border);
      color: var(--text);
      background: var(--surface);
    }

    .suggestion-chip::before {
      content: '→';
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Messages */
    .message {
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: fadeUp 0.25s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-question {
      font-size: 17px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.01em;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-soft);
    }

    .message-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .message-answer {
      font-size: 15px;
      color: var(--text);
      line-height: 1.75;
      white-space: pre-wrap;
    }

    /* Sources */
    .sources {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .sources-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .source-item {
      padding: 10px 14px;
      border-left: 2px solid var(--border);
      background: var(--surface);
      border-radius: 0 3px 3px 0;
    }

    .source-file {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .source-snippet {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Loading state */
    .loading-indicator {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 24px 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
    }

    .loading-indicator.visible { display: flex; }

    .loader-dots {
      display: flex;
      gap: 4px;
    }

    .loader-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      animation: dot-bounce 1.2s ease-in-out infinite;
    }

    .loader-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Error */
    .error-msg {
      display: none;
      padding: 12px 16px;
      border: 1px solid var(--red-dim);
      border-radius: 4px;
      background: rgba(224, 92, 92, 0.05);
      font-family: var(--mono);
      font-size: 12px;
      color: var(--red);
    }
    .error-msg.visible { display: block; }

    /* ── Input ── */
    footer {
      padding: 20px 0 32px;
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      align-items: stretch;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: #3a3a3a;
    }

    .input-prefix {
      display: flex;
      align-items: center;
      padding: 0 14px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      flex-shrink: 0;
      user-select: none;
    }

    #question-input {
      flex: 1;
      background: var(--surface);
      border: none;
      outline: none;
      padding: 14px 16px;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text);
      caret-color: var(--accent);
    }

    #question-input::placeholder {
      color: var(--text-dim);
    }

    #submit-btn {
      padding: 0 20px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: #0e0e0e;
      letter-spacing: 0.06em;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    #submit-btn:hover { opacity: 0.85; }
    #submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-hint {
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .input-hint kbd {
      font-family: var(--mono);
      font-size: 10px;
      padding: 1px 5px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface);
      color: var(--text-muted);
    }

    /* divider between messages */
    .message + .message {
      padding-top: 32px;
      border-top: 1px solid var(--border-soft);
    }

    @media (max-width: 600px) {
      .layout { padding: 0 16px; }
      header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .header-left .tagline { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <header>
      <div class="header-left">
        <h1>RAG-Js-Concepts</h1>
        <div class="tagline">Ask anything about <span>GenAI & Agentic AI</span></div>
      </div>
      <button class="status-btn checking" id="status-btn" title="Click to wake up the service">
        <div class="status-dot"></div>
        <span class="status-label" id="status-label">checking...</span>
      </button>
    </header>

    <main>
      <div class="wake-notice" id="wake-notice">
        <span class="wake-icon">⏳</span>
        <span>Service is spinning up — this takes about 30 seconds on a cold start. Your query will be sent automatically once it's ready.</span>
      </div>

      <div class="chat-area" id="chat-area">
        <div class="empty-state" id="empty-state">
          <div class="prompt-label">Try asking</div>
          <div class="suggestions">
            <button class="suggestion-chip" onclick="fillAndSubmit('What is RAG and how does it work?')">What is RAG and how does it work?</button>
            <button class="suggestion-chip" onclick="fillAndSubmit('What is the difference between base model and instruction-tuned model?')">What is the difference between base model and instruction-tuned model?</button>
            <button class="suggestion-chip" onclick="fillAndSubmit('How does temperature affect LLM output?')">How does temperature affect LLM output?</button>
            <button class="suggestion-chip" onclick="fillAndSubmit('What is hallucination and how can RAG reduce it?')">What is hallucination and how can RAG reduce it?</button>
            <button class="suggestion-chip" onclick="fillAndSubmit('When should I use few-shot vs zero-shot prompting?')">When should I use few-shot vs zero-shot prompting?</button>
          </div>
        </div>
      </div>

      <div class="loading-indicator" id="loading">
        <div class="loader-dots">
          <span></span><span></span><span></span>
        </div>
        <span id="loading-text">embedding query...</span>
      </div>

      <div class="error-msg" id="error-msg"></div>
    </main>

    <footer>
      <div class="input-row">
        <div class="input-prefix">&gt;</div>
        <input
          type="text"
          id="question-input"
          placeholder="Ask a question about the indexed documents..."
          autocomplete="off"
          spellcheck="false"
        />
        <button id="submit-btn" disabled>RUN</button>
      </div>
      <div class="input-hint"><kbd>Enter</kbd> to submit &nbsp;·&nbsp; answers grounded in indexed docs only</div>
    </footer>
  </div>

  <script>
    const statusBtn = document.getElementById('status-btn');
    const statusLabel = document.getElementById('status-label');
    const submitBtn = document.getElementById('submit-btn');
    const questionInput = document.getElementById('question-input');
    const chatArea = document.getElementById('chat-area');
    const emptyState = document.getElementById('empty-state');
    const loadingEl = document.getElementById('loading');
    const loadingText = document.getElementById('loading-text');
    const errorEl = document.getElementById('error-msg');
    const wakeNotice = document.getElementById('wake-notice');

    let serviceOnline = false;
    let pendingQuestion = null;
    let wakePolling = false;

    // ── Status / wake logic ──

    function setStatus(state) {
      statusBtn.className = 'status-btn ' + state;
      if (state === 'online') {
        statusLabel.textContent = 'online';
        serviceOnline = true;
        submitBtn.disabled = false;
        wakeNotice.classList.remove('visible');
        wakePolling = false;
        if (pendingQuestion) {
          const q = pendingQuestion;
          pendingQuestion = null;
          runQuery(q);
        }
      } else if (state === 'offline') {
        statusLabel.textContent = 'offline — click to wake';
        serviceOnline = false;
        submitBtn.disabled = true;
      } else {
        statusLabel.textContent = 'checking...';
        serviceOnline = false;
        submitBtn.disabled = true;
      }
    }

    async function checkHealth(silent = false) {
      if (!silent) setStatus('checking');
      try {
        const res = await fetch('/api/health', { signal: AbortSignal.timeout(8000) });
        if (res.ok) {
          setStatus('online');
          return true;
        }
      } catch (_) {}
      setStatus('offline');
      return false;
    }

    async function wakeAndPoll() {
      if (wakePolling) return;
      wakePolling = true;
      wakeNotice.classList.add('visible');
      setStatus('checking');

      // Poll every 5s for up to 90s
      const maxAttempts = 18;
      for (let i = 0; i < maxAttempts; i++) {
        await new Promise(r => setTimeout(r, 5000));
        try {
          const res = await fetch('/api/health', { signal: AbortSignal.timeout(6000) });
          if (res.ok) {
            setStatus('online');
            return;
          }
        } catch (_) {}
        if (!wakePolling) return; // aborted
      }
      // Timed out
      wakePolling = false;
      setStatus('offline');
      wakeNotice.classList.remove('visible');
      showError('Service took too long to respond. Try clicking the status button again.');
    }

    statusBtn.addEventListener('click', () => {
      if (serviceOnline) return;
      wakeAndPoll();
    });

    // ── Query logic ──

    async function runQuery(question) {
      if (!question.trim()) return;

      hideError();
      emptyState.style.display = 'none';

      // Render question immediately
      const msgEl = createMessageEl(question);
      chatArea.appendChild(msgEl);
      msgEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

      showLoading('embedding query...');
      submitBtn.disabled = true;
      questionInput.value = '';

      try {
        loadingText.textContent = 'searching vector store...';
        await new Promise(r => setTimeout(r, 400)); // tiny visual beat

        loadingText.textContent = 'generating answer...';
        const res = await fetch('/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Server error');

        hideLoading();
        renderAnswer(msgEl, data.answer, data.sources);
      } catch (err) {
        hideLoading();
        showError(err.message);
        // Roll back message if no answer
        msgEl.remove();
        if (chatArea.children.length === 0) emptyState.style.display = '';
      } finally {
        submitBtn.disabled = !serviceOnline;
      }
    }

    function createMessageEl(question) {
      const el = document.createElement('div');
      el.className = 'message';
      el.innerHTML = `<div class="message-question">${escHtml(question)}</div>`;
      return el;
    }

    function renderAnswer(msgEl, answer, sources) {
      const answerEl = document.createElement('div');
      answerEl.className = 'message-answer';
      answerEl.textContent = answer;
      msgEl.appendChild(answerEl);

      if (sources && sources.length) {
        const sourcesEl = document.createElement('div');
        sourcesEl.className = 'sources';
        sourcesEl.innerHTML = `<div class="sources-label">Retrieved chunks</div>` +
          sources.map(s => `
            <div class="source-item">
              <div class="source-file">${escHtml(s.source)}</div>
              <div class="source-snippet">${escHtml(s.snippet)}</div>
            </div>
          `).join('');
        msgEl.appendChild(sourcesEl);
      }

      msgEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showLoading(text) {
      loadingText.textContent = text;
      loadingEl.classList.add('visible');
    }

    function hideLoading() {
      loadingEl.classList.remove('visible');
    }

    function showError(msg) {
      errorEl.textContent = '✗ ' + msg;
      errorEl.classList.add('visible');
    }

    function hideError() {
      errorEl.classList.remove('visible');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Input handlers ──

    questionInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSubmit();
      }
    });

    submitBtn.addEventListener('click', handleSubmit);

    function handleSubmit() {
      const q = questionInput.value.trim();
      if (!q) return;
      if (!serviceOnline) {
        pendingQuestion = q;
        wakeAndPoll();
        return;
      }
      runQuery(q);
    }

    function fillAndSubmit(text) {
      questionInput.value = text;
      questionInput.focus();
      if (!serviceOnline) {
        pendingQuestion = text;
        wakeAndPoll();
        return;
      }
      runQuery(text);
    }

    // ── Boot ──
    checkHealth();
  </script>
</body>
</html>
